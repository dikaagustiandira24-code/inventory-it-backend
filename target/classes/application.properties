# ============================================================
# INVENTORY IT - Application Config
# ============================================================

server.port=8089

# --- Database SQL Server ---
# GANTI sesuai instance SQL Server kamu:
# - Jika install default instance: localhost:1433
# - Jika named instance (misal SQLEXPRESS): localhost\\SQLEXPRESS atau pakai port manual
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=inventory_it;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=dikacvr2424
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
# ddl-auto: validate = tidak ubah struktur tabel (rekomendasi karena tabel sudah dibuat manual lewat SSMS)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- CORS (untuk frontend di Netlify bisa akses backend) ---
app.cors.allowed-origins=http://localhost:1433,https://*.netlify.app

# --- JWT ---
app.jwt.secret=cvrcvrcvrcvrcvrcvrcvrcvrcvrcvrcv
app.jwt.expiration-ms=86400000

# --- File upload (foto barang) ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- Logging ---
logging.level.com.cvrangga.inventory=DEBUG
logging.level.org.springframework.security=INFO
